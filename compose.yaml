services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: psx
      POSTGRES_USER: psx_scraper
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U psx_scraper -d psx"]
      interval: 5s
      timeout: 5s
      retries: 12

  scraper:
    build: .
    environment:
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: psx
      PGUSER: psx_scraper
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_data:
